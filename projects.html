<script>
  // ── Project content loader ────────────────────────────────────────
  // Each project lives in Input/project-N.txt with this format:
  //   ->  Title
  //   --> Subtitle / meta (affiliation · date)
  //   --- Description paragraph
  //   #   Tag1 | Tag2 | Tag3
  //
  // To ADD a new project: create Input/project-N.txt with the next number.
  // The page discovers them automatically — no HTML changes needed.
  // ─────────────────────────────────────────────────────────────────

  async function loadText(file) {
    const r = await fetch(file);
    if (!r.ok) return null;
    return (await r.text()).trim();
  }

  function parseProject(text) {
    const result = { title: '', meta: '', desc: '', tags: [] };
    for (const line of text.split('\n')) {
      const t = line.trim();
      if (t.startsWith('--->'))      { /* reserved for future use */ }
      else if (t.startsWith('-->'))  result.meta  = t.slice(3).trim();
      else if (t.startsWith('->'))   result.title = t.slice(2).trim();
      else if (t.startsWith('---'))  result.desc  = t.slice(3).trim();
      else if (t.startsWith('#'))    result.tags  = t.slice(1).split('|').map(s => s.trim()).filter(Boolean);
    }
    return result;
  }

  async function loadProjects() {
    const intro = await loadText('Input/project-intro.txt');
    if (intro) document.getElementById('project-intro').textContent = intro;

    const container = document.getElementById('project-cards');
    let n = 1;
    while (true) {
      const text = await loadText(`Input/project-${n}.txt`);
      if (text === null) break;
      const p = parseProject(text);
      const tagsHtml = p.tags.map(t => `<span class="tag">${t}</span>`).join('');
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        ${p.meta ? `<div class="card-meta">${p.meta}</div>` : ''}
        <h3>${p.title}</h3>
        <p style="margin-top:6px; font-size:0.88rem; color:var(--muted);">${p.desc}</p>
        ${tagsHtml ? `<div class="card-tags">${tagsHtml}</div>` : ''}
      `;
      container.appendChild(card);
      n++;
    }
  }

  loadProjects();
</script>
